# Auto-load any dashboard JSON dropped into /var/lib/grafana/dashboards (mounted
# from deployments/grafana/dashboards). The TradePulse dashboard
# (throughput, Kafka lag, alert counts) lands here in Sprint 6.
apiVersion: 1

providers:
- name: tradepulse
  orgId: 1
  folder: TradePulse
  type: file
  disableDeletion: false
  updateIntervalSeconds: 30
  allowUiUpdates: true
  options:
    path: /var/lib/grafana/dashboards
    foldersFromFilesStructure: true
