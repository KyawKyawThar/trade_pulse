name: CI

# Runs on every PR and on pushes to main. This is the merge gate: a red CI
# blocks the merge (enforce via branch protection — see docs/CONTRIBUTING.md).
on:
  push:
    branches: [ main ]
  pull_request:

    # Cancel superseded runs on the same ref so a force-push doesn't pile up jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26.1"
  # CRITICAL: turn the workspace OFF in CI. go.work is a local-dev convenience;
  # CI must validate each module the way `docker build` does — through its own
  # go.mod + `replace ../../shared`. If CI used the workspace it could pass while
  # a hermetic image build fails.
  GOWORK: "off"

jobs:
  # Lint + format + module-tidiness, one job per module (matrix). fail-fast off
  # so one module's failure still shows the others.
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
        - shared
        - services/ingestion-service
        - services/processor-service
        - services/analytics-service
        - services/api-service
        - services/notification-service
        - services/fx-rate-service
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: ${{ matrix.module }}/go.sum

    - name: gofmt
      working-directory: ${{ matrix.module }}
      run: |
        out=$(gofmt -l .)
        if [ -n "$out" ]; then echo "::error::not gofmt'd:"; echo "$out"; exit 1; fi

    - name: go mod tidy is clean
      working-directory: ${{ matrix.module }}
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum \
          || (echo "::error::go.mod/go.sum not tidy — run 'make tidy' and commit"; exit 1)

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.1 # pinned for reproducible CI; matches local dev + .golangci.yml v2
        working-directory: ${{ matrix.module }}

  # Unit tests with the race detector, one job per module.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
        - shared
        - services/ingestion-service
        - services/processor-service
        - services/analytics-service
        - services/api-service
        - services/notification-service
        - services/fx-rate-service
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: ${{ matrix.module }}/go.sum
    - name: go vet
      working-directory: ${{ matrix.module }}
      run: go vet ./...
    - name: go test -race
      working-directory: ${{ matrix.module }}
      run: go test -race -count=1 -coverprofile=coverage.out ./...
    - name: upload coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-${{ strategy.job-index }}
        path: ${{ matrix.module }}/coverage.out
        if-no-files-found: ignore

  # Compile every service binary. Cheap, and catches link-time breakage the
  # per-package test job can miss.
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
        - ingestion-service
        - processor-service
        - analytics-service
        - api-service
        - notification-service
        - fx-rate-service
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: services/${{ matrix.service }}/go.sum
    - name: build
      working-directory: services/${{ matrix.service }}
      run: CGO_ENABLED=0 go build -trimpath -o /tmp/${{ matrix.service }} ./cmd

  # Build (but DO NOT push) container images on PRs — proves every Dockerfile
  # still builds from the repo-root context. Pushing happens only on tags
  # (release.yml). Uses Buildx layer caching to stay fast.
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
        - ingestion-service
        - processor-service
        - analytics-service
        - api-service
        - notification-service
        - fx-rate-service
    steps:
    - uses: actions/checkout@v7
    - uses: docker/setup-buildx-action@v4
    - name: build image (no push)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: services/${{ matrix.service }}/Dockerfile
        push: false
        tags: tradepulse/${{ matrix.service }}:ci
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # A single required check to point branch protection at, so adding a service
  # to the matrix doesn't mean editing the protection rule each time.
  ci-success:
    if: always()
    needs: [ lint, test, build, docker-build ]
    runs-on: ubuntu-latest
    steps:
    - name: verify all matrix jobs passed
      run: |
        if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
          echo "one or more CI jobs failed"; exit 1
        fi
        echo "all green"
