name: Release

# Tag-driven releases: push a semver tag (e.g. v0.1.0) and this builds + pushes
# multi-arch images for all six services to GitHub Container Registry (GHCR),
# stamping version/commit/date into each binary via build args.
on:
  push:
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write # push to GHCR

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
        - ingestion-service
        - processor-service
        - analytics-service
        - api-service
        - notification-service
        - fx-rate-service
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-qemu-action@v3 # cross-arch emulation for arm64
    - uses: docker/setup-buildx-action@v3

    - name: log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: derive image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/tradepulse-${{ matrix.service }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: services/${{ matrix.service }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ github.ref_name }}
          COMMIT=${{ github.sha }}
          DATE=${{ github.event.repository.updated_at }}
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}
